<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>クイズシステム完全版</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;transition:background-color .8s;font-family:sans-serif}
#app{position:relative;width:100%;height:100%;background:inherit}
button{cursor:pointer}
#startBtn,#nextBtn{
position:absolute;z-index:1000;padding:15px 30px;font-size:28px;border:none;border-radius:12px
}
#startBtn{left:50%;top:50%;transform:translate(-50%,-50%)}
#nextBtn{right:20px;bottom:20px;display:none}
#bgmBtn,#countBtn{
position:absolute;z-index:1000;padding:12px 22px;font-size:22px;border:none;border-radius:12px;display:none;
}
#bgmBtn{left:20px;bottom:20px;background:#f59e0b;color:#fff}
#countBtn{left:160px;bottom:20px;background:#10b981;color:#fff}
#questionWrap{
position:absolute;inset:0;display:flex;flex-direction:row;
align-items:center;justify-content:center;gap:24px;color:white;opacity:0;transition:opacity .8s, transform .8s;z-index:120;
}
#questionWrap.bottomMode{
  top:auto;bottom:4vh;align-items:flex-end;transform:translateY(8px);
}
#question{font-size:min(4vw,36px);line-height:1.3;text-align:center;margin:0;transition:transform .8s, font-size .8s}
#hint{max-width:45vw;max-height:28vh;opacity:0;transition:opacity 1.2s, transform .8s;object-fit:contain}
#questionWrap.bottomMode #question{font-size:min(3.4vw,32px);transform:translateY(-2px)}
#questionWrap.bottomMode #hint{max-width:20vw;max-height:14vh;transform:scale(1.04)}
.shrink{transform:scale(.2) translateY(-300px);opacity:0}
#effect{position:absolute;inset:0;pointer-events:none;z-index:10}
#flash{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .35s;z-index:5}
.stripe{
position:absolute;top:-10vh;width:160px;height:130vh;
transform:rotate(35deg);border-radius:999px;opacity:0;
box-shadow:0 0 18px rgba(255,255,255,.18)
}
@keyframes stripeCloseLeft{
0%{transform:translateX(-60vw) rotate(35deg);opacity:0}
18%{opacity:.25}
100%{transform:translateX(18vw) rotate(35deg);opacity:.08}
}
@keyframes stripeCloseRight{
0%{transform:translateX(60vw) rotate(35deg);opacity:0}
18%{opacity:.25}
100%{transform:translateX(-18vw) rotate(35deg);opacity:.08}
}
.centerImg{
position:absolute;left:50%;top:50%;
transform:translate(-50%,-50%);
max-width:80%;max-height:80%;
opacity:0;z-index:50;
}
#assembleCanvas{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:51;display:none;}
#whiteFlash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:300;}
#doors{position:absolute;inset:0;display:none;z-index:70}
.door{position:absolute;top:0;width:50%;height:100%;transition:transform 1.2s cubic-bezier(.2,.8,.2,1)}
#doorL{left:0;background:#ff3b30;transform:translateX(-100%)}
#doorR{right:0;background:#3b82f6;transform:translateX(100%)}
.openL{transform:translateX(0)}
.openR{transform:translateX(0)}
#choices{position:absolute;inset:0;display:none;z-index:80}
.side{position:absolute;width:50%;height:100%}
.left{left:0;background:#ff3b30}
.right{right:0;background:#3b82f6}
.choice{
position:absolute;left:50%;top:-600px;
transform:translateX(-50%);
width:min(90%,680px);cursor:pointer
}
#result{
display:none;position:absolute;inset:0;
justify-content:center;align-items:center;
background:rgba(0,0,0,.08);z-index:200
}
#result img.main{
max-width:90%;max-height:90%;
transform:scale(.75);transform-origin:center;
transition:transform 1.1s cubic-bezier(.2,.8,.2,1), opacity .6s;
opacity:0;
animation:pulseImage 1.8s ease-in-out infinite;
}
@keyframes pulseImage{0%,100%{transform:scale(.95)}50%{transform:scale(1.05)}}
#result::after{
 content:"";position:absolute;inset:0;pointer-events:none;
 transform:scaleX(0);transform-origin:left;
 transition:transform 2.2s cubic-bezier(.15,.8,.25,1);
 z-index:0;
}
#result.red::after{background:linear-gradient(90deg,#ff3b30 0%,#ff8a80 45%,#b00000 100%);transform:scaleX(1)}
#result.blue::after{background:linear-gradient(90deg,#3b82f6 0%,#93c5fd 45%,#1e3a8a 100%);transform-origin:right;transform:scaleX(1)}
#result img.main,#result #maru,.confetti{position:relative;z-index:1}
#maru{
position:absolute;left:50%;top:50%;
max-width:60%;transform:translate(-50%,-50%) translateX(26px);
opacity:0;transition:1.5s;
animation:pulseMaru 1.6s ease-in-out infinite;
}
@keyframes pulseMaru{0%,100%{transform:translate(-50%,-50%) translateX(26px) scale(.95)}50%{transform:translate(-50%,-50%) translateX(26px) scale(1.08)}}
.coinWrap{
 position:absolute; width:800px; height:540px; transform-style:preserve-3d;
 animation:coinSpin 1.1s linear infinite;
 z-index:3;
}
.coinFace,.coinBack{
 position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:24px;
 box-shadow:0 18px 30px rgba(0,0,0,.28);
 backface-visibility:hidden;
}
.coinBack{transform:rotateY(180deg)}
@keyframes coinSpin{from{transform:rotateY(0deg)}to{transform:rotateY(360deg)}}
.confetti{
position:absolute;width:14px;height:14px
}
</style>
</head>
<body>
<div id="app">
<button id="startBtn">次の問題は？</button>
<button id="nextBtn">次へ</button>
<button id="bgmBtn">🎵 BGM</button>
<button id="countBtn">⏱ 10カウント</button>

<div id="questionWrap">
<div id="question">ピカチュウはどっちですか？</div>
<img id="hint" src="hint.jpg">
</div>

<div id="whiteFlash"></div>
<div id="effect"></div>
<div id="flash"></div>

<canvas id="assembleCanvas"></canvas>
<img id="aka" class="centerImg" src="aka.jpg">
<img id="ao" class="centerImg" src="ao.jpg">

<div id="doors">
<div id="doorL" class="door"></div>
<div id="doorR" class="door"></div>
</div>

<div id="choices">
<div class="side left"><img id="akaChoice" class="choice" src="aka.jpg"></div>
<div class="side right"><img id="aoChoice" class="choice" src="ao.jpg"></div>
</div>

<div id="result">
<img class="main" id="resultImg">
<img id="maru" src="maru.png">
</div>

<audio id="jajan" src="jajan.mp3"></audio>
<audio id="oto" src="oto.mp3"></audio>
<audio id="seikai" src="seikai.mp3"></audio>
<audio id="dSound" src="d.mp3"></audio>
<audio id="bgm" src="bgm.mp3" loop></audio>
</div>

<script>
let stage=0;

const startBtn=document.getElementById("startBtn");
const nextBtn=document.getElementById("nextBtn");
const doorL=document.getElementById("doorL");
const doorR=document.getElementById("doorR");

startBtn.onclick=startQuiz;
document.addEventListener("keydown",e=>{
 if(e.key!=="Enter") return;
 e.preventDefault();
 if(stage===0) startQuiz();
 else advance();
});

nextBtn.onclick=()=>{
 if(stage===4){
  location.href="2.html";
  return;
 }
 advance();
};

function startQuiz(){
 document.getElementById("jajan").play().catch(()=>{});
 startBtn.style.display="none";
 nextBtn.style.display="block";
 questionWrap.classList.remove("bottomMode");
 questionWrap.style.opacity=1;
 setTimeout(()=>hint.style.opacity=1,500);
 stage=1;
}

function advance(){
 if(stage===1){
   questionWrap.classList.remove("bottomMode");
   questionWrap.classList.add("shrink");
   questionWrap.style.opacity=0;
   hint.style.opacity=0;
   redScene();
   stage=2;
 }
 else if(stage===2){
   questionWrap.classList.remove("bottomMode");
   questionWrap.style.opacity=0;
   hint.style.opacity=0;
   blueScene();
   stage=3;
 }
 else if(stage===3){
   revealChoices();
   stage=4;
 }
}

function stripes(color, flashColor){
 const fx=document.getElementById("effect");
 const flash=document.getElementById("flash");
 fx.innerHTML="";
 flash.style.background=flashColor;
 flash.style.opacity=1;
 setTimeout(()=>{flash.style.opacity=0;},900);

 const count=7;
 for(let i=0;i<count;i++){
  const left=document.createElement("div");
  left.className="stripe";
  left.style.left=(-120 + i*45)+"px";
  left.style.background=color;
  left.style.animation=`stripeCloseLeft 1.1s ease-in-out ${i*55}ms forwards`;
  fx.appendChild(left);

  const right=document.createElement("div");
  right.className="stripe";
  right.style.left=(window.innerWidth - 90 - i*45)+"px";
  right.style.background=color;
  right.style.animation=`stripeCloseRight 1.1s ease-in-out ${i*55}ms forwards`;
  fx.appendChild(right);
 }
 setTimeout(()=>{fx.innerHTML="";},1500);
}

function assembleImage(imgEl){
 const canvas=document.getElementById("assembleCanvas");
 // サイズ決定
 const maxW=window.innerWidth*0.8, maxH=window.innerHeight*0.8;
 const nat=imgEl.naturalWidth||400, natH=imgEl.naturalHeight||400;
 const scale=Math.min(maxW/nat, maxH/natH, 1);
 const W=Math.round(nat*scale), H=Math.round(natH*scale);
 canvas.width=W; canvas.height=H;
 canvas.style.width=W+"px"; canvas.style.height=H+"px";
 canvas.style.display="block";

 const ctx=canvas.getContext("2d");
 const COLS=16, ROWS=16;

 // タイル座標シャッフル
 const tiles=[];
 for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) tiles.push({r,c});
 tiles.sort(()=>Math.random()-.5);

 const DURATION=1400;
 let start=null;
 let prevShown=0;

 const sparks=[];
 function addSparks(x,y){
  for(let i=0;i<6;i++) sparks.push({
   x,y,vx:(Math.random()-.5)*10,vy:(Math.random()-.5)*10,
   life:1,size:2+Math.random()*3,
   color:`hsl(${Math.random()*80+20},100%,75%)`
  });
 }

 function drawStar(ctx,x,y,r,alpha,color){
  ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=color;
  ctx.beginPath();
  for(let i=0;i<8;i++){
   const a=i*Math.PI/4, rd=i%2===0?r:r*0.4;
   i===0?ctx.moveTo(x+rd*Math.cos(a),y+rd*Math.sin(a)):ctx.lineTo(x+rd*Math.cos(a),y+rd*Math.sin(a));
  }
  ctx.closePath();ctx.fill();ctx.restore();
 }

 function draw(now){
  if(!start) start=now;
  ctx.clearRect(0,0,W,H);
  const t=Math.min((now-start)/DURATION,1);
  const shown=Math.floor(t*tiles.length);

  for(let i=0;i<shown;i++){
   const {r,c}=tiles[i];
   const x=Math.round(c*W/COLS), y=Math.round(r*H/ROWS);
   const w=Math.round((c+1)*W/COLS)-x, h=Math.round((r+1)*H/ROWS)-y;
   ctx.drawImage(imgEl, c*(imgEl.naturalWidth/COLS), r*(imgEl.naturalHeight/ROWS),
    imgEl.naturalWidth/COLS, imgEl.naturalHeight/ROWS, x, y, w, h);
  }

  // 新規タイルにスパーク追加
  for(let i=prevShown;i<shown;i++){
   const {r,c}=tiles[i];
   const x=Math.round(c*W/COLS)+W/COLS/2, y=Math.round(r*H/ROWS)+H/ROWS/2;
   addSparks(x,y);
  }
  prevShown=shown;

  for(let i=sparks.length-1;i>=0;i--){
   const s=sparks[i];
   s.x+=s.vx; s.y+=s.vy; s.vx*=0.92; s.vy*=0.92; s.life-=0.04;
   if(s.life<=0){sparks.splice(i,1);continue;}
   drawStar(ctx,s.x,s.y,s.size*s.life,s.life,s.color);
  }

  if(t<1 || sparks.length>0) requestAnimationFrame(draw);
  else{ canvas.style.display="none"; imgEl.style.opacity=1; }
 }
 requestAnimationFrame(draw);
}

function redScene(){
 oto.play().catch(()=>{});
 document.body.style.backgroundColor="#ff1a1a";
 document.documentElement.style.backgroundColor="#ff1a1a";
 stripes("rgba(255,40,40,0.95)", "rgba(255,0,0,0.22)");
 assembleImage(aka);
}

function blueScene(){
 oto.currentTime=0;
 oto.play().catch(()=>{});
 document.body.style.backgroundColor="#1a4cff";
 document.documentElement.style.backgroundColor="#1a4cff";
 aka.style.opacity=0;
 stripes("rgba(40,90,255,0.95)", "rgba(0,70,255,0.22)");
 assembleImage(ao);
}

function revealChoices(){
 ao.style.opacity=0;
 questionWrap.classList.remove("shrink");
 questionWrap.classList.add("bottomMode");
 questionWrap.style.opacity=1;
 hint.style.opacity=1;
 doors.style.display="block";

 doorL.style.transform="translateX(-100%)";
 doorR.style.transform="translateX(100%)";
 doorL.classList.remove("openL");
 doorR.classList.remove("openR");

 requestAnimationFrame(()=>{
  doorL.style.transform="translateX(0)";
  doorR.style.transform="translateX(0)";
 });

 setTimeout(()=>{
  choices.style.display="block";
  bounce(akaChoice);
  bounce(aoChoice);
  showChoiceButtons();
 },1800);
}

function bounce(el){
 let pos=-600,speed=0;
 const floor=100,g=1.1;
 const t=setInterval(()=>{
  speed+=g;
  pos+=speed;
  if(pos>floor){pos=floor;speed*=-0.55;}
  el.style.top=pos+"px";
  if(Math.abs(speed)<1 && pos===floor) clearInterval(t);
 },16);
}

// BGM・カウントボタン初期化（最初にロード）
const bgmAudio=document.getElementById("bgm");
bgmAudio.volume=0.7;
bgmAudio.load();
const bgmBtn=document.getElementById("bgmBtn");
const countBtn=document.getElementById("countBtn");
let bgmPlaying=false;
let countRunning=false;

bgmBtn.onclick=()=>{
 if(bgmPlaying){
  bgmAudio.pause();
  bgmAudio.currentTime=0;
  bgmPlaying=false;
  bgmBtn.textContent="🎵 BGM";
 } else {
  bgmAudio.play().catch(()=>{});
  bgmPlaying=true;
  bgmBtn.textContent="⏹ BGM停止";
 }
};

countBtn.onclick=()=>{
 if(countRunning) return;
 countRunning=true;
 countBtn.disabled=true;
 if(bgmPlaying) bgmAudio.volume=0.2;
 let n=10;
 const speak=(num)=>{
  const u=new SpeechSynthesisUtterance(num===0?"ゼロ":String(num));
  u.lang="ja-JP";
  u.rate=0.9;
  u.onend=()=>{
   if(num===0){
    // ビープ音
    const ctx=new AudioContext();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.value=880;
    osc.start();gain.gain.setValueAtTime(0.6,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.8);
    osc.stop(ctx.currentTime+0.8);
    if(bgmPlaying){
     bgmAudio.pause();
     bgmAudio.currentTime=0;
     bgmPlaying=false;
     bgmBtn.textContent="🎵 BGM";
    }
    bgmAudio.volume=0.7;
    countRunning=false;
    countBtn.disabled=false;
   } else {
    setTimeout(()=>speak(num-1),200);
   }
  };
  speechSynthesis.speak(u);
 };
 speechSynthesis.cancel();
 speak(n);
};

function showChoiceButtons(){
 bgmBtn.style.display="block";
 countBtn.style.display="block";
}

function hideChoiceButtons(){
 bgmBtn.style.display="none";
 countBtn.style.display="none";
 if(bgmPlaying){
  bgmAudio.pause();
  bgmAudio.currentTime=0;
  bgmPlaying=false;
  bgmBtn.textContent="🎵 BGM";
 }
 bgmAudio.volume=0.7;
 speechSynthesis.cancel();
 countRunning=false;
 countBtn.disabled=false;
}
akaChoice.onclick=()=>answer("left","aka.jpg");
aoChoice.onclick=()=>answer("right","ao.jpg");

function answer(side,file){
 choices.style.display="none";
 hideChoiceButtons();
 result.style.display="flex";
 result.classList.remove("red","blue");

 const d=document.getElementById("dSound");
 d.currentTime=0;

 let answerShown=false;
 const showAnswer=()=>{
  if(answerShown) return;
  answerShown=true;
  result.classList.add(file.includes("aka.jpg") ? "red" : "blue");
  const coinWrap=result.querySelector(".coinWrap");
  if(coinWrap) coinWrap.remove();
  resultImg.src=file;
  resultImg.style.opacity=0;
  resultImg.style.transform="scale(.75)";
  requestAnimationFrame(()=>{
   resultImg.style.opacity=1;
   resultImg.style.transform="scale(1)";
  });
  document.body.style.background = file.includes("aka.jpg") ? "linear-gradient(90deg, #ff3b30 0%, #ff8a80 60%, #b00000 100%)" : "linear-gradient(90deg, #3b82f6 0%, #93c5fd 60%, #1e3a8a 100%)";
  document.documentElement.style.background = document.body.style.background;
  document.getElementById("seikai").play().catch(()=>{});
  setTimeout(()=>{
   maru.style.opacity=1;
   confetti();
  },300);
 };

 const coinWrap=document.createElement("div");
 coinWrap.className="coinWrap";
 const face=document.createElement("img");
 face.className="coinFace";
 face.src=file;
 const back=document.createElement("img");
 back.className="coinBack";
 back.src=file.includes("aka.jpg") ? "ao.jpg" : "aka.jpg";
 coinWrap.append(face,back);
 result.appendChild(coinWrap);

 d.onended=showAnswer;
 d.play().catch(()=>{
  setTimeout(showAnswer, 1800);
 });

 if(Number.isFinite(d.duration) && d.duration>0){
  setTimeout(showAnswer, d.duration*1000 + 50);
 }
}

function confetti(){
 for(let i=0;i<180;i++){
  const c=document.createElement("div");
  c.className="confetti";
  c.style.background=`hsl(${Math.random()*360},100%,50%)`;
  c.style.left=Math.random()*innerWidth+"px";
  c.style.top="-20px";
  result.appendChild(c);

  let x=parseFloat(c.style.left), y=-20;
  const vx=(Math.random()-0.5)*8;
  const vy=4+Math.random()*5;

  const t=setInterval(()=>{
   x+=vx; y+=vy;
   c.style.left=x+"px";
   c.style.top=y+"px";
   c.style.transform=`rotate(${y*5}deg)`;
   if(y>innerHeight+50){clearInterval(t);c.remove();}
  },16);
 }
}
</script>
</body>
</html>
