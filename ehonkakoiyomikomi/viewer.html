<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Picture Touch Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
      }
      body {
        font-family: "Segoe UI", "Noto Sans JP", sans-serif;
        background: #f5f7fb;
        color: #111827;
      }
      .container {
        width: 100%;
        min-height: 100vh;
        box-sizing: border-box;
        margin: 0 auto;
        padding: 12px;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }
      button, select {
        padding: 8px 10px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: white;
        cursor: pointer;
      }
      .viewer-shell {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 16px;
        height: calc(100vh - 100px);
      }
      .canvas-area {
        background: white;
        border-radius: 12px;
        padding: 8px;
        border: 1px solid #e5e7eb;
        min-height: 360px;
        height: 100%;
      }
      canvas {
        display: block;
        border: 1px solid #cbd5e1;
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        width: 100%;
        height: 100%;
      }
      .panel {
        background: white;
        border-radius: 12px;
        padding: 16px;
        border: 1px solid #e5e7eb;
        overflow: auto;
        height: 100%;
      }
      .message {
        min-height: 120px;
        padding: 10px;
        border-radius: 8px;
        background: #f8fafc;
        white-space: pre-wrap;
      }
      @media (max-width: 900px) {
        .viewer-shell {
          grid-template-columns: 1fr;
          height: auto;
        }
        .canvas-area,
        .panel {
          height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="toolbar">
        <button id="start-read">読む</button>
        <button id="stop-read">止める</button>
      </div>
      <div class="viewer-shell">
        <div class="canvas-area">
          <canvas id="viewer-canvas"></canvas>
        </div>
        <div class="panel">
          <h2>読み上げ</h2>
          <div id="current-label" class="message">まだ読み上げていません</div>
        </div>
      </div>
    </div>
    <script src="./firebase-config.js"></script>
    <script type="module" src="./js/viewer-page.js"></script>
  </body>
</html>
