<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Picture Touch Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
      }
      body {
        font-family: "Segoe UI", "Noto Sans JP", sans-serif;
        background: #f5f7fb;
        color: #111827;
      }
      .container {
        width: 100%;
        min-height: 100vh;
        box-sizing: border-box;
        margin: 0 auto;
        padding: 12px;
      }
      .toolbar {
        display: none;
      }
      button {
        padding: 8px 10px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: white;
        cursor: pointer;
      }
      .canvas-area {
        background: white;
        border-radius: 12px;
        padding: 8px;
        border: 1px solid #e5e7eb;
        min-height: 360px;
        height: calc(100vh - 40px);
      }
      canvas {
        display: block;
        border: 1px solid #cbd5e1;
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        width: 100%;
        height: 100%;
      }
      .panel,
      .message {
        display: none;
      }
      @media (max-width: 900px) {
        .canvas-area {
          min-height: calc(100vh - 40px);
          height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="canvas-area">
        <canvas id="viewer-canvas"></canvas>
      </div>
    </div>
    <script src="./firebase-config.js"></script>
    <script type="module" src="./js/viewer-page.js"></script>
  </body>
</html>
