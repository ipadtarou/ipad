<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Picture Touch Editor</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="toolbar">
        <div class="toolbar-group">
          <button data-action="select-image">画像選択</button>
          <button data-action="edit-mode" class="active">編集モード</button>
          <button data-action="view-mode">閲覧モード</button>
          <button data-action="save">保存</button>
          <button data-action="undo">Undo</button>
          <button data-action="redo">Redo</button>
          <select id="zoom-select">
            <option value="1">100%</option>
            <option value="1.5">150%</option>
            <option value="2">200%</option>
            <option value="3">300%</option>
          </select>
        </div>
      </header>

      <main class="workspace">
        <section class="canvas-panel">
          <div class="image-list">
            <h2>画像一覧</h2>
            <div class="thumb-list">
              <button class="thumb active" data-image="01">01.jpg</button>
            </div>
          </div>

          <div class="canvas-frame">
            <canvas id="main-canvas"></canvas>
            <div class="status-bar" id="status-bar">編集モード</div>
          </div>
        </section>

        <aside class="side-panel" id="side-panel">
          <div class="panel-header">
            <button id="close-panel" aria-label="閉じる">×</button>
          </div>
          <div class="panel-body">
            <input id="field-object-id" type="hidden" />

            <label>
              名前
              <input id="field-name" type="text" />
            </label>

            <label>
              メッセージ
              <textarea id="field-text"></textarea>
            </label>

            <label>
              音声URL
              <input id="field-voice" type="text" />
            </label>

            <label>
              色
              <input id="field-color" type="color" />
            </label>

            <label class="checkbox-row">
              <input id="field-visible" type="checkbox" />
              <span>表示</span>
            </label>

            <label>
              優先順位
              <input id="field-order" type="number" min="1" />
            </label>

            <div class="button-row">
              <button id="save-object">保存</button>
              <button id="delete-object">削除</button>
            </div>
          </div>
        </aside>
      </main>
    </div>

    <script src="./firebase-config.js"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
